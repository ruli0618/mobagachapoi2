<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANGERME Official Online Gacha - STAINED GLASS Ver.</title>
<style>
  :root {
    --bg: #07080d;
    --panel: rgba(255,255,255,0.10);
    --panel-strong: rgba(255,255,255,0.16);
    --text: #ffffff;
    --sub: rgba(255,255,255,0.78);
    --gold: #f5d36c;
    --blue: #52c8ff;
  }

  * { box-sizing: border-box; }

  body {
    font-family: Arial, "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif;
    text-align: center;
    padding: 28px;
    margin: 0;
    min-height: 100vh;
    color: var(--text);
    background:
      radial-gradient(circle at 20% 10%, rgba(79, 192, 255, 0.22), transparent 32%),
      radial-gradient(circle at 80% 0%, rgba(255, 219, 117, 0.20), transparent 36%),
      radial-gradient(circle at 50% 80%, rgba(255, 122, 203, 0.12), transparent 38%),
      var(--bg);
  }

  h1 {
    margin: 0;
    font-size: clamp(26px, 4vw, 48px);
    line-height: 1.05;
    letter-spacing: 0.03em;
    text-shadow: 0 4px 16px rgba(0,0,0,0.75);
  }

  .subtitle {
    margin: 8px auto 18px;
    color: var(--sub);
    font-weight: 700;
    letter-spacing: 0.08em;
  }

  .top-actions {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    margin: 18px auto 22px;
  }

  button {
    border: 0;
    border-radius: 999px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    color: #10121c;
    background: linear-gradient(135deg, #ffffff, #d7f4ff);
    box-shadow: 0 5px 16px rgba(0,0,0,0.28);
  }

  button:hover { transform: translateY(-1px); }
  button.primary {
    background: linear-gradient(135deg, #fff3b8, #6bd6ff);
    padding-inline: 26px;
  }

  .video-frame {
    width: 100%;
    max-width: 900px;
    aspect-ratio: 16/9;
    background: #000;
    position: relative;
    overflow: hidden;
    margin: 0 auto 20px;
    display: block;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.18);
    box-shadow: 0 18px 50px rgba(0,0,0,0.55);
  }

  .video-frame video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
    position: relative;
  }

  .overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: min(84%, 620px);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.8s;
    z-index: 2;
  }

  .result-card {
    padding: 24px 20px;
    border-radius: 18px;
    background: rgba(0,0,0,0.68);
    border: 2px solid rgba(255,255,255,0.38);
    box-shadow: 0 8px 32px rgba(0,0,0,0.55), inset 0 0 30px rgba(255,255,255,0.08);
    text-shadow: 0 3px 7px #000;
    white-space: pre-line;
  }

  .result-rarity {
    display: inline-block;
    margin-bottom: 8px;
    padding: 4px 14px;
    border-radius: 999px;
    font-size: clamp(18px, 3vw, 30px);
    letter-spacing: 0.09em;
  }

  .result-member {
    display: block;
    font-size: clamp(28px, 5vw, 54px);
    font-weight: 900;
    line-height: 1.05;
  }

  .result-item {
    display: block;
    margin-top: 8px;
    font-size: clamp(20px, 3vw, 34px);
    font-weight: 900;
  }

  .result-size {
    display: block;
    margin-top: 5px;
    color: rgba(255,255,255,0.75);
    font-size: clamp(12px, 1.7vw, 16px);
    font-weight: 700;
  }

  .counter-overlay {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.62);
    color: #fff;
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 15px;
    z-index: 2;
    backdrop-filter: blur(5px);
  }

  .main-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(280px, 420px);
    gap: 18px;
    max-width: 1160px;
    margin: 0 auto;
    align-items: start;
  }

  .panel {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 18px;
    padding: 16px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.28);
    backdrop-filter: blur(6px);
    text-align: left;
  }

  .panel h2 {
    margin: 0 0 12px;
    font-size: 18px;
    text-align: center;
  }

  .lineup-row {
    display: grid;
    grid-template-columns: 54px 1fr;
    gap: 10px;
    padding: 10px 0;
    border-top: 1px solid rgba(255,255,255,0.12);
  }

  .lineup-row:first-of-type { border-top: 0; }
  .badge {
    align-self: start;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 46px;
    padding: 4px 8px;
    border-radius: 999px;
    font-weight: 900;
    color: #080a12;
  }

  .badge-sr { background: linear-gradient(90deg, #ff8bdc, #fff06b, #5be7ff); }
  .badge-r  { background: var(--gold); }
  .badge-n  { background: #ffffff; }

  .lineup-name { font-weight: 900; font-size: 15px; }
  .lineup-meta { color: var(--sub); font-size: 12px; margin-top: 2px; }

  #history {
    display:none;
    margin-top: 14px;
    max-height: 260px;
    overflow: auto;
  }

  #history .history-item {
    padding: 8px 10px;
    border-top: 1px solid rgba(255,255,255,0.11);
    font-weight: 700;
  }

  .white-text { color: white; }
  .gold-text  { color: gold; }
  .rainbow-text {
    background: linear-gradient(to right, #ff7acb, #ffe970, #6ee7ff, #b48cff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 900;
  }

  #itemModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.78);
    align-items: center;
    justify-content: center;
    z-index: 999;
    padding: 18px;
  }

  #itemModal .modal-content {
    background: #161925;
    padding: 20px;
    border-radius: 16px;
    width: 100%;
    max-width: 560px;
    color: #fff;
    text-align: left;
    border: 1px solid rgba(255,255,255,0.18);
  }

  #itemModal h2 { margin-top: 0; font-size: 20px; text-align: center; }
  .item-group { margin-bottom: 16px; }
  .item-group h3 { margin-bottom: 8px; font-size: 16px; }
  .item-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .item-list input {
    flex: 1 1 45%;
    padding: 8px 10px;
    border:1px solid #444;
    border-radius:8px;
    background: #222739;
    color: #fff;
  }
  .item-group button.add { margin-top: 8px; padding:7px 12px; font-size:12px; }
  .modal-actions { text-align: right; margin-top: 12px; }
  .modal-actions button { margin-left: 8px; }

  @media (max-width: 980px) {
    .main-grid { grid-template-columns: 1fr; }
    body { padding: 18px; }
  }
</style>
</head>
<body>

<h1>ANGERME Official Online Gacha</h1>
<div class="subtitle">- STAINED GLASS Ver. - / 1play 500yen</div>

<div class="top-actions">
  <button id="drawButton" class="primary">ガチャを回す</button>
  <button id="showHistoryButton">獲得アイテム一覧</button>
  <button id="editItemsButton">出現アイテム編集</button>
  <button id="resetButton">リセット</button>
</div>

<div class="main-grid">
  <div>
    <div class="video-frame">
      <!-- 動画ファイル名は元アプリと同じ。GitHub上の動画をそのまま使えます。 -->
      <video id="gachaVideo" src="scene_1.mp4" autoplay loop muted playsinline></video>
      <div id="overlay" class="overlay"></div>
      <div id="counter" class="counter-overlay"></div>
    </div>
  </div>

  <aside class="panel">
    <h2>景品ラインナップ</h2>
    <div class="lineup-row">
      <span class="badge badge-sr">SR</span>
      <div>
        <div class="lineup-name">フェイスタオル</div>
        <div class="lineup-meta">全9種 / サイズ: 本体 約W340mm × H840mm</div>
      </div>
    </div>
    <div class="lineup-row">
      <span class="badge badge-r">R</span>
      <div>
        <div class="lineup-name">アクリルマルチバンド</div>
        <div class="lineup-meta">全9種 / サイズ: 約W90mm × H40mm</div>
      </div>
    </div>
    <div class="lineup-row">
      <span class="badge badge-r">R</span>
      <div>
        <div class="lineup-name">アクリルキーホルダー</div>
        <div class="lineup-meta">全9種 / サイズ: 約W38mm × H67mm</div>
      </div>
    </div>
    <div class="lineup-row">
      <span class="badge badge-n">N</span>
      <div>
        <div class="lineup-name">缶バッジ</div>
        <div class="lineup-meta">全9種 / サイズ: 約φ56mm</div>
      </div>
    </div>

    <div id="history"></div>
  </aside>
</div>

<div id="itemModal">
  <div class="modal-content">
    <h2>出現アイテム編集</h2>

    <div class="item-group" data-rarity="N">
      <h3>Nアイテム</h3>
      <div class="item-list" id="list-N"></div>
      <button class="add" data-rarity="N">＋Nアイテムを追加</button>
    </div>

    <div class="item-group" data-rarity="R">
      <h3>Rアイテム</h3>
      <div class="item-list" id="list-R"></div>
      <button class="add" data-rarity="R">＋Rアイテムを追加</button>
    </div>

    <div class="item-group" data-rarity="SR">
      <h3>SRアイテム</h3>
      <div class="item-list" id="list-SR"></div>
      <button class="add" data-rarity="SR">＋SRアイテムを追加</button>
    </div>

    <div class="modal-actions">
      <button id="cancelEdit">キャンセル</button>
      <button id="saveEdit">保存</button>
    </div>
  </div>
</div>

<script>
  //―――― STAINED GLASS Ver. 初期データ
  // 現在のアンジュルムメンバー名を漢字表記で設定しています。
  const members = [
    "伊勢鈴蘭",
    "為永幸音",
    "橋迫鈴",
    "川名凜",
    "松本わかな",
    "平山遊季",
    "下井谷幸穂",
    "後藤花",
    "長野桃羽"
  ];

  let counts = { SR:0, R:0, N:0 };
  let history = [];

  // 排出率は元アプリの雰囲気を維持。必要ならここだけ変更してください。
  const rarities = [
    { type:"N", rate:65 },
    { type:"R", rate:30 },
    { type:"SR",rate:5 }
  ];

  let itemsConfig = {
    N:["缶バッジ"],
    R:["アクリルマルチバンド", "アクリルキーホルダー"],
    SR:["フェイスタオル"]
  };

  const itemSizes = {
    "フェイスタオル":"本体 約W340mm × H840mm",
    "アクリルマルチバンド":"約W90mm × H40mm",
    "アクリルキーホルダー":"約W38mm × H67mm",
    "缶バッジ":"約φ56mm"
  };

  const videoEl   = document.getElementById("gachaVideo");
  const overlayEl = document.getElementById("overlay");
  const counterEl = document.getElementById("counter");
  const histEl    = document.getElementById("history");

  function escapeHtml(str) {
    return String(str).replace(/[&<>'"]/g, tag => ({
      '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;'
    }[tag]));
  }

  function updateCounter(){
    counterEl.innerText = `SR:${counts.SR}個 / R:${counts.R}個 / N:${counts.N}個`;
  }

  function getRandomRarity(){
    let r = Math.random() * 100;
    let sum = 0;
    for (let x of rarities){
      sum += x.rate;
      if (r <= sum) return x.type;
    }
    return rarities[rarities.length - 1].type;
  }

  function rarityClass(rarity) {
    if (rarity === "SR") return "rainbow-text";
    if (rarity === "R") return "gold-text";
    return "white-text";
  }

  function buildDisplayText(member, rarity, item){
    const safeMember = escapeHtml(member);
    const safeRarity = escapeHtml(rarity);
    const safeItem = escapeHtml(item);
    const safeSize = itemSizes[item] ? escapeHtml(itemSizes[item]) : "";
    return `
      <div class="result-card ${rarityClass(rarity)}">
        <span class="result-rarity">${safeRarity}</span>
        <span class="result-member">${safeMember}</span>
        <span class="result-item">${safeItem}</span>
        ${safeSize ? `<span class="result-size">${safeSize}</span>` : ""}
      </div>
    `;
  }

  function drawGacha(){
    const member = members[Math.floor(Math.random() * members.length)];
    const rarity = getRandomRarity();
    const itemArr = itemsConfig[rarity];
    const item = itemArr[Math.floor(Math.random() * itemArr.length)];

    //―――― 動画まわりは元アプリの構成を維持
    videoEl.src = "scene_2.mp4";
    videoEl.loop = false;
    overlayEl.style.opacity = 0;
    overlayEl.innerHTML = "";

    videoEl.onended = () => {
      videoEl.src = rarity === "SR" ? "scene_3_rarity_A.mp4" : rarity === "R" ? "scene_3_rarity_B.mp4" : "scene_3_rarity_C.mp4";
      videoEl.loop = true;
      videoEl.play();
      setTimeout(() => {
        overlayEl.innerHTML = buildDisplayText(member, rarity, item);
        overlayEl.style.opacity = 1;
        counts[rarity]++;
        history.push({member, rarity, item});
        updateCounter();
        renderHistoryIfOpen();
      }, 200);
    };
    videoEl.play();
  }

  function renderHistoryIfOpen(){
    if (histEl.style.display !== "block") return;
    if (!history.length) {
      histEl.innerHTML = `<div class="history-item">まだ獲得アイテムはありません。</div>`;
      return;
    }
    histEl.innerHTML = history.map((h, idx) => {
      const cls = rarityClass(h.rarity);
      return `<div class="history-item ${cls}">${idx + 1}. ${escapeHtml(h.member)}: ${escapeHtml(h.rarity)}-${escapeHtml(h.item)}</div>`;
    }).join("");
  }

  videoEl.addEventListener("click", drawGacha);
  document.getElementById("drawButton").addEventListener("click", drawGacha);

  document.getElementById("showHistoryButton").addEventListener("click", () => {
    histEl.style.display = histEl.style.display === "block" ? "none" : "block";
    renderHistoryIfOpen();
  });

  document.getElementById("resetButton").addEventListener("click", () => {
    counts = {SR:0, R:0, N:0};
    history = [];
    updateCounter();
    histEl.style.display = "none";
    histEl.innerHTML = "";
    overlayEl.style.opacity = 0;
    overlayEl.innerHTML = "";
  });

  updateCounter();

  //―――― モーダル
  const modal = document.getElementById("itemModal");
  const btnEdit = document.getElementById("editItemsButton");
  const btnSave = document.getElementById("saveEdit");
  const btnCancel = document.getElementById("cancelEdit");

  function populateModal(){
    ["N", "R", "SR"].forEach(rty => {
      const cont = document.getElementById(`list-${rty}`);
      cont.innerHTML = "";
      itemsConfig[rty].forEach(name => {
        const inp = document.createElement("input");
        inp.value = name;
        cont.appendChild(inp);
      });
    });
  }

  document.querySelectorAll("#itemModal .add").forEach(btn => btn.addEventListener("click", () => {
    const r = btn.dataset.rarity;
    const inp = document.createElement("input");
    inp.placeholder = "アイテム名を入力";
    document.getElementById(`list-${r}`).appendChild(inp);
  }));

  btnEdit.addEventListener("click", () => {
    populateModal();
    modal.style.display = "flex";
  });

  btnCancel.addEventListener("click", () => {
    modal.style.display = "none";
  });

  btnSave.addEventListener("click", () => {
    ["N", "R", "SR"].forEach(rty => {
      const vals = Array.from(document.querySelectorAll(`#list-${rty} input`))
        .map(i => i.value.trim())
        .filter(v => v);
      if (vals.length) itemsConfig[rty] = vals;
    });
    modal.style.display = "none";
    alert("出現アイテム設定を更新しました！");
  });
</script>

</body>
</html>
