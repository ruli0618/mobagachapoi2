<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANGERME / BEYOOOOONDS 切り替えガチャ</title>
<style>
  :root{
    --bg1:#071015;
    --bg2:#16212a;
    --bg3:#0a1117;
    --accent1:#67c5ff;
    --accent2:#f5d36c;
    --panel:rgba(255,255,255,.11);
    --line:rgba(255,255,255,.18);
    --text:#fff;
    --sub:rgba(255,255,255,.80);
    --buttonText:#102030;
    --titleShadow:#0b2437;
    --resultMember:#fff6d8;
    --resultItem:#ffe38f;
    --resultVariant:#fff4d4;
    --resultSize:#fff9ea;
    --resultPillBg:rgba(255,255,255,.20);
    --resultPillText:#25465e;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    min-height:100vh;
    padding:24px;
    font-family:Arial,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;
    text-align:center;
    color:var(--text);
    background:
      radial-gradient(circle at 18% 10%, color-mix(in srgb, var(--accent1) 28%, transparent), transparent 34%),
      radial-gradient(circle at 82% 8%, color-mix(in srgb, var(--accent2) 28%, transparent), transparent 32%),
      radial-gradient(circle at 50% 95%, color-mix(in srgb, var(--accent1) 18%, transparent), transparent 38%),
      linear-gradient(135deg,var(--bg1),var(--bg2) 55%,var(--bg3));
  }
  h1{
    margin:0;
    font-size:clamp(28px,5vw,58px);
    line-height:1.0;
    letter-spacing:.02em;
    color:#ffffff;
    text-shadow:0 4px 0 color-mix(in srgb, var(--titleShadow) 85%, black),0 10px 26px rgba(0,0,0,.58);
  }
  .subtitle{
    display:inline-block;
    margin:10px auto 18px;
    padding:7px 18px;
    border-radius:999px;
    background:rgba(255,255,255,.14);
    border:1px solid var(--line);
    color:#f4faff;
    font-weight:900;
    letter-spacing:.04em;
    max-width:min(92vw,920px);
  }
  .campaign-switch{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    margin:0 auto 14px;
  }
  .campaign-btn{
    border:1px solid rgba(255,255,255,.18);
    border-radius:999px;
    padding:10px 16px;
    font-size:14px;
    font-weight:900;
    cursor:pointer;
    color:#fff;
    background:rgba(255,255,255,.10);
    box-shadow:0 6px 18px rgba(0,0,0,.25);
  }
  .campaign-btn.active{
    color:var(--buttonText);
    background:linear-gradient(135deg,#fff7c0,var(--accent1));
  }
  .top-actions{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    margin:0 auto 18px;
  }
  button.action{
    border:0;
    border-radius:999px;
    padding:10px 18px;
    font-size:14px;
    font-weight:900;
    cursor:pointer;
    color:var(--buttonText);
    background:linear-gradient(135deg,#fffde8,color-mix(in srgb, var(--accent1) 55%, white));
    box-shadow:0 6px 18px rgba(0,0,0,.28);
  }
  button.action:hover, .campaign-btn:hover{transform:translateY(-1px)}
  button.action.primary{padding-inline:28px;background:linear-gradient(135deg,#fff3a6,var(--accent1))}
  .main-grid{
    display:grid;
    grid-template-columns:minmax(0,1fr) minmax(290px,430px);
    gap:18px;
    max-width:1200px;
    margin:0 auto;
    align-items:start;
  }
  .video-frame{
    width:100%;
    max-width:900px;
    aspect-ratio:16/9;
    background:#000;
    position:relative;
    overflow:hidden;
    margin:0 auto;
    border-radius:20px;
    border:1px solid rgba(255,255,255,.22);
    box-shadow:0 18px 56px rgba(0,0,0,.58);
  }
  .video-frame video{width:100%;height:100%;object-fit:cover;position:relative;z-index:0}
  .overlay{
    position:absolute;
    top:50%;left:50%;transform:translate(-50%,-50%);
    width:min(86%,650px);
    pointer-events:none;
    opacity:0;
    transition:opacity .75s;
    z-index:2;
  }
  .result-card{
    padding:23px 20px;
    border-radius:20px;
    background:rgba(2,9,14,.74);
    border:2px solid rgba(255,255,255,.40);
    box-shadow:0 8px 32px rgba(0,0,0,.56), inset 0 0 30px rgba(255,255,255,.08);
    text-shadow:0 3px 8px #000;
    white-space:pre-line;
  }
  .result-rarity{
    display:inline-block;
    margin-bottom:8px;
    padding:4px 15px;
    border-radius:999px;
    font-size:clamp(18px,3vw,30px);
    letter-spacing:.08em;
    font-weight:900;
    border:1px solid rgba(255,255,255,.42);
    box-shadow:0 4px 14px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.45);
  }
  .result-rarity.rarity-n{
    background:linear-gradient(180deg,#f7f8fb 0%, #d8dee5 100%);
    color:#3a4754;
  }
  .result-rarity.rarity-r{
    background:linear-gradient(180deg,#fff3ca 0%, #e1bc66 100%);
    color:#6f4c08;
  }
  .result-rarity.rarity-sr{
    background:linear-gradient(135deg,#fff9df 0%, #f4d57d 38%, #fff0b2 68%, #fffced 100%);
    color:#7a5510;
  }
  .result-member{display:block;font-size:clamp(28px,5vw,54px);font-weight:900;line-height:1.05;color:var(--resultMember);margin-top:2px}
  .result-item{display:block;margin-top:8px;font-size:clamp(20px,3vw,32px);font-weight:900;color:var(--resultItem)}
  .result-variant{display:block;margin-top:5px;color:var(--resultVariant);font-size:clamp(13px,1.8vw,17px);font-weight:800}
  .result-size{display:block;margin-top:5px;color:var(--resultSize);font-size:clamp(13px,1.8vw,17px);font-weight:800}
  .counter-overlay{
    position:absolute;
    bottom:12px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,.64);
    color:#fff;
    padding:7px 14px;
    border-radius:999px;
    font-size:15px;
    z-index:2;
    backdrop-filter:blur(5px);
  }
  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:20px;
    padding:16px;
    box-shadow:0 12px 32px rgba(0,0,0,.28);
    backdrop-filter:blur(7px);
    text-align:left;
  }
  .panel h2{margin:0 0 12px;text-align:center;font-size:18px}
  .lineup-row{display:grid;grid-template-columns:56px 1fr;gap:10px;padding:10px 0;border-top:1px solid rgba(255,255,255,.12)}
  .lineup-row:first-of-type{border-top:0}
  .badge{display:inline-flex;align-items:center;justify-content:center;align-self:start;min-width:48px;padding:4px 8px;border-radius:999px;font-weight:900;color:#0c1510}
  .badge-sr{background:linear-gradient(90deg,#fff2a8,#84e6bb,#c0fbef)}
  .badge-r{background:var(--accent2)}
  .badge-n{background:#fff}
  .lineup-name{font-weight:900;font-size:15px}
  .lineup-meta{color:var(--sub);font-size:12px;margin-top:2px;line-height:1.55}
  #history{display:none;margin-top:14px;max-height:290px;overflow:auto}
  .history-item{padding:8px 10px;border-top:1px solid rgba(255,255,255,.12);font-weight:800;line-height:1.45}
  .white-text{color:white}
  .gold-text{color:#ffe36a}
  .rainbow-text{
    background:linear-gradient(to right,#fff3a2,#86ffc8,#75ceff,#ffd3ef);
    -webkit-background-clip:text;background-clip:text;color:transparent;font-weight:900;
  }
  #listModal,#drawResultModal{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);
    align-items:center;justify-content:center;z-index:999;padding:18px;
  }
  #listModal .modal-content,#drawResultModal .modal-content{
    width:100%;max-width:780px;max-height:82vh;overflow:auto;background:#162027;color:#fff;
    border-radius:18px;border:1px solid rgba(255,255,255,.2);padding:20px;text-align:left;
  }
  #listModal h2,#drawResultModal h2{margin-top:0;text-align:center}
  .prize-list{columns:2;column-gap:26px;font-size:13px;line-height:1.7}
  .prize-list div{break-inside:avoid;border-bottom:1px solid rgba(255,255,255,.08);padding:2px 0}
  .draw-summary{
    text-align:center;
    margin:0 auto 14px;
    padding:10px 12px;
    border-radius:14px;
    background:rgba(255,255,255,.10);
    border:1px solid rgba(255,255,255,.14);
    font-weight:900;
    line-height:1.7;
  }
  .draw-result-list{font-size:13px;line-height:1.7}
  .draw-result-list div{border-bottom:1px solid rgba(255,255,255,.08);padding:3px 0}
  .modal-actions{text-align:right;margin-top:14px}
  .help-text{max-width:1040px;margin:0 auto 14px;color:var(--sub);font-size:13px}
  @media(max-width:980px){
    body{padding:18px}
    .main-grid{grid-template-columns:1fr}
    .prize-list{columns:1}
  }
</style>
</head>
<body>

<div class="campaign-switch">
  <button class="campaign-btn active" data-campaign="angerme">ANGERME</button>
  <button class="campaign-btn" data-campaign="beyooooonds">BEYOOOOONDS</button>
</div>

<h1 id="pageTitle">ANGERME</h1>
<div class="subtitle" id="pageSubtitle">Official Online Gacha - STAINED GLASS Ver. - / 1play 500yen</div>
<div class="help-text">上のボタンでアンジュルム版とBEYOOOOONDS版を切り替えできます。各グループごとに獲得履歴とカウントを保持します。</div>

<div class="top-actions">

  <button id="drawHundredButton" class="action primary">100連</button>

<div class="main-grid">

<div id="drawResultModal">
  <div class="modal-content">
    <h2 id="drawResultTitle">まとめ引き結果</h2>
    <div id="drawResultSummary" class="draw-summary"></div>
    <div id="drawResultList" class="draw-result-list"></div>
    <div class="modal-actions"><button id="closeDrawResultModal" class="action">閉じる</button></div>
  </div>
</div>

<script>
  const itemSizes = {
    angerme: {
      "フェイスタオル": "本体 約W340mm × H840mm",
      "アクリルマルチバンド": "約W90mm × H40mm",
      "アクリルキーホルダー": "約W38mm × H67mm",
      "缶バッジ": "約φ56mm"
    },
    beyooooonds: {
      "メモリアルパネル": "約W180mm × H150mm",
      "BIGアクリルスタンド": "本体 約W100mm × H160mm / 台座 約W60mm × H30mm",
      "ソロアクリルキーホルダー": "約W51.5mm × H65mm",
      "コレクションステッカー2枚セット": "約W55mm × H91mm"
    }
  };

  const rarities = [
    { type:"N", rate:65 },
    { type:"R", rate:30 },
    { type:"SR", rate:5 }
  ];

  const campaigns = {
    angerme: {
      title: "ANGERME",
      subtitle: "Official Online Gacha - STAINED GLASS Ver. - / 1play 500yen",
      prizeListTitle: "ANGERME 景品ラインナップ詳細",
      theme: {
        bg1: "#07131c", bg2: "#163043", bg3: "#08111a",
        accent1: "#57c6ff", accent2: "#f2c96a", buttonText: "#0e2231", titleShadow: "#294d68",
        resultMember: "#f8fbff", resultItem: "#ffe7a5", resultVariant: "#ffffff", resultSize: "#eef7ff",
        resultPillBg: "rgba(255,255,255,.82)", resultPillText: "#2f6f93"
      },
      lineup: [
        { badge:"SR", name:"フェイスタオル", meta:"全9種 / サイズ: 本体 約W340mm × H840mm" },
        { badge:"R", name:"アクリルマルチバンド", meta:"全9種 / サイズ: 約W90mm × H40mm" },
        { badge:"R", name:"アクリルキーホルダー", meta:"全9種 / サイズ: 約W38mm × H67mm" },
        { badge:"N", name:"缶バッジ", meta:"全9種 / サイズ: 約φ56mm" }
      ],
      state: { counts:{SR:0,R:0,N:0}, history:[] },
      pools: createAngermePrizePools()
    },
    beyooooonds: {
      title: "BEYOOOOONDS",
      subtitle: "CONCERT 2026 SPRING [HIGH! TENSION BEYOSCOOOOPE] / Official Online Gacha",
      prizeListTitle: "BEYOOOOONDS 景品ラインナップ詳細",
      theme: {
        bg1: "#07140f", bg2: "#14251d", bg3: "#09130f",
        accent1: "#79d8ad", accent2: "#d6b64e", buttonText: "#132018", titleShadow: "#5d7a48",
        resultMember: "#fff2c5", resultItem: "#ffe18b", resultVariant: "#fff7df", resultSize: "#fffaf0",
        resultPillBg: "rgba(255,240,194,.88)", resultPillText: "#7a5612"
      },
      lineup: [
        { badge:"SR", name:"メモリアルパネル", meta:"全1種 / サイズ: 約W180mm × H150mm" },
        { badge:"SR", name:"BIGアクリルスタンド", meta:"全19種 / 各メンバー2種 + 高瀬くるみSP1種<br>サイズ: 本体 約W100mm × H160mm / 台座 約W60mm × H30mm" },
        { badge:"R", name:"ソロアクリルキーホルダー", meta:"全10種 / 高瀬くるみのみ通常 + SP版<br>サイズ: 約W51.5mm × H65mm" },
        { badge:"N", name:"コレクションステッカー2枚セット", meta:"全10種 / 高瀬くるみのみ通常 + SP版<br>サイズ: 約W55mm × H91mm" }
      ],
      state: { counts:{SR:0,R:0,N:0}, history:[] },
      pools: createBeyoPrizePools()
    }
  };

  let activeCampaignKey = "angerme";
  let isRolling = false;
  const STORAGE_KEY = "hello_gacha_switcher_state_v1";

  const videoEl = document.getElementById("gachaVideo");
  const overlayEl = document.getElementById("overlay");
  const counterEl = document.getElementById("counter");
  const histEl = document.getElementById("history");
  const lineupContainer = document.getElementById("lineupContainer");

  function createAngermePrizePools(){
    const members = [
      "伊勢鈴蘭",
      "為永幸音",
      "橋迫鈴",
      "川名凜",
      "松本わかな",
      "平山遊季",
      "下井谷幸穂",
      "後藤花",
      "長野桃羽"
    ];
    const pools = { SR:[], R:[], N:[] };
    members.forEach(member => {
      pools.SR.push({ rarity:"SR", member, item:"フェイスタオル", variant:"" });
      pools.R.push({ rarity:"R", member, item:"アクリルマルチバンド", variant:"" });
      pools.R.push({ rarity:"R", member, item:"アクリルキーホルダー", variant:"" });
      pools.N.push({ rarity:"N", member, item:"缶バッジ", variant:"" });
    });
    return pools;
  }

  function createBeyoPrizePools(){
    const members = [
      "西田汐里",
      "江口紗耶",
      "高瀬くるみ",
      "前田こころ",
      "岡村美波",
      "清野桃々姫",
      "平井美葉",
      "小林萌花",
      "里吉うたの"
    ];
    const pools = { SR:[], R:[], N:[] };
    pools.SR.push({ rarity:"SR", member:"BEYOOOOONDS", item:"メモリアルパネル", variant:"集合ビジュアル" });
    members.forEach(member => {
      pools.SR.push({ rarity:"SR", member, item:"BIGアクリルスタンド", variant:"通常A" });
      pools.SR.push({ rarity:"SR", member, item:"BIGアクリルスタンド", variant:"通常B" });
      pools.R.push({ rarity:"R", member, item:"ソロアクリルキーホルダー", variant:"通常" });
      pools.N.push({ rarity:"N", member, item:"コレクションステッカー2枚セット", variant:"通常" });
    });
    pools.SR.push({ rarity:"SR", member:"高瀬くるみ", item:"BIGアクリルスタンド", variant:"SP / ホログラム仕様" });
    pools.R.push({ rarity:"R", member:"高瀬くるみ", item:"ソロアクリルキーホルダー", variant:"SP / ホログラム仕様" });
    pools.N.push({ rarity:"N", member:"高瀬くるみ", item:"コレクションステッカー2枚セット", variant:"SP / ホログラム仕様" });
    return pools;
  }

  function sanitizeHistoryItem(item){
    if (!item || typeof item !== "object") return null;
    return {
      rarity: typeof item.rarity === "string" ? item.rarity : "",
      member: typeof item.member === "string" ? item.member : "",
      item: typeof item.item === "string" ? item.item : "",
      variant: typeof item.variant === "string" ? item.variant : ""
    };
  }

  function loadPersistedData(){
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const parsed = JSON.parse(raw);
      if (parsed && parsed.activeCampaignKey && campaigns[parsed.activeCampaignKey]) {
        activeCampaignKey = parsed.activeCampaignKey;
      }
      if (!parsed || !parsed.campaignStates || typeof parsed.campaignStates !== "object") return;
      Object.keys(campaigns).forEach(key => {
        const saved = parsed.campaignStates[key];
        if (!saved || typeof saved !== "object") return;
        const counts = saved.counts && typeof saved.counts === "object" ? saved.counts : {};
        const history = Array.isArray(saved.history) ? saved.history.map(sanitizeHistoryItem).filter(Boolean) : [];
        campaigns[key].state = {
          counts: {
            SR: Number.isFinite(counts.SR) ? counts.SR : 0,
            R: Number.isFinite(counts.R) ? counts.R : 0,
            N: Number.isFinite(counts.N) ? counts.N : 0
          },
          history
        };
      });
    } catch (error) {
      console.warn("保存データの読み込みに失敗しました", error);
    }
  }

  function savePersistedData(){
    try {
      const payload = {
        activeCampaignKey,
        campaignStates: {}
      };
      Object.keys(campaigns).forEach(key => {
        payload.campaignStates[key] = campaigns[key].state;
      });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    } catch (error) {
      console.warn("保存データの書き込みに失敗しました", error);
    }
  }

  function currentCampaign(){ return campaigns[activeCampaignKey]; }
  function currentState(){ return campaigns[activeCampaignKey].state; }

  function escapeHtml(str){
    return String(str).replace(/[&<>'"]/g, tag => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[tag]));
  }

  function rarityClass(rarity){
    if (rarity === "SR") return "rainbow-text";
    if (rarity === "R") return "gold-text";
    return "white-text";
  }

  function updateTheme(){
    const t = currentCampaign().theme;
    const root = document.documentElement;
    root.style.setProperty('--bg1', t.bg1);
    root.style.setProperty('--bg2', t.bg2);
    root.style.setProperty('--bg3', t.bg3);
    root.style.setProperty('--accent1', t.accent1);
    root.style.setProperty('--accent2', t.accent2);
    root.style.setProperty('--buttonText', t.buttonText);
    root.style.setProperty('--titleShadow', t.titleShadow);
    root.style.setProperty('--resultMember', t.resultMember);
    root.style.setProperty('--resultItem', t.resultItem);
    root.style.setProperty('--resultVariant', t.resultVariant);
    root.style.setProperty('--resultSize', t.resultSize);
    root.style.setProperty('--resultPillBg', t.resultPillBg);
    root.style.setProperty('--resultPillText', t.resultPillText);
  }

  function renderLineup(){
    lineupContainer.innerHTML = currentCampaign().lineup.map(row => `
      <div class="lineup-row">
        <span class="badge badge-${row.badge.toLowerCase()}">${escapeHtml(row.badge)}</span>
        <div>
          <div class="lineup-name">${escapeHtml(row.name)}</div>
          <div class="lineup-meta">${row.meta}</div>
        </div>
      </div>
    `).join('');
  }

  function updateCounter(){
    const counts = currentState().counts;
    counterEl.innerText = `SR:${counts.SR}個 / R:${counts.R}個 / N:${counts.N}個`;
  }

  function renderHistoryIfOpen(){
    if (histEl.style.display !== 'block') return;
    const history = currentState().history;
    if (!history.length) {
      histEl.innerHTML = `<div class="history-item">まだ獲得アイテムはありません。</div>`;
      return;
    }
    histEl.innerHTML = history.map((h, idx) => {
      const cls = rarityClass(h.rarity);
      const variant = h.variant ? `（${escapeHtml(h.variant)}）` : '';
      return `<div class="history-item ${cls}">${idx + 1}. ${escapeHtml(h.member)}: ${escapeHtml(h.rarity)}-${escapeHtml(h.item)}${variant}</div>`;
    }).join('');
  }

  function renderPrizeList(){
    const target = document.getElementById('prizeList');
    const rows = [];
    ['SR','R','N'].forEach(rarity => {
      currentCampaign().pools[rarity].forEach(p => {
        const variant = p.variant ? `（${escapeHtml(p.variant)}）` : '';
        rows.push(`<div><strong>${escapeHtml(p.rarity)}</strong> ${escapeHtml(p.member)} / ${escapeHtml(p.item)}${variant}</div>`);
      });
    });
    target.innerHTML = rows.join('');
    document.getElementById('prizeListTitle').innerText = currentCampaign().prizeListTitle;
  }

  function summarizeResults(results){
    return results.reduce((acc, prize) => {
      acc[prize.rarity] = (acc[prize.rarity] || 0) + 1;
      return acc;
    }, { SR:0, R:0, N:0 });
  }

  function getBestRarity(results){
    if (results.some(p => p.rarity === 'SR')) return 'SR';
    if (results.some(p => p.rarity === 'R')) return 'R';
    return 'N';
  }

  function renderDrawResultModal(results){
    const summary = summarizeResults(results);
    document.getElementById('drawResultTitle').innerText = `${results.length}連 結果`;
    document.getElementById('drawResultSummary').innerHTML = `合計 ${results.length}個<br>SR:${summary.SR}個 / R:${summary.R}個 / N:${summary.N}個`;
    document.getElementById('drawResultList').innerHTML = results.map((p, idx) => {
      const variant = p.variant ? `（${escapeHtml(p.variant)}）` : '';
      const cls = rarityClass(p.rarity);
      return `<div class="${cls}">${idx + 1}. ${escapeHtml(p.member)} / ${escapeHtml(p.item)}${variant}</div>`;
    }).join('');
    document.getElementById('drawResultModal').style.display = 'flex';
  }

  function buildMultiDisplayText(results){
    const summary = summarizeResults(results);
    const best = getBestRarity(results);
    const cls = rarityClass(best);
    return `
      <div class="result-card ${cls}">
        <span class="result-member">${results.length}連 結果</span>
        <span class="result-item">SR:${summary.SR}個 / R:${summary.R}個 / N:${summary.N}個</span>
        <span class="result-size">詳細は結果リストに表示</span>
      </div>
    `;
  }

  function buildDisplayText(prize){
    const size = itemSizes[activeCampaignKey][prize.item] || '';
    return `
      <div class="result-card">
        <span class="result-member">${escapeHtml(prize.member)}</span>
        <span class="result-item">${escapeHtml(prize.item)}</span>
        ${prize.variant ? `<span class="result-variant">${escapeHtml(prize.variant)}</span>` : ''}
        ${size ? `<span class="result-size">${escapeHtml(size)}</span>` : ''}
      </div>
    `;
  }

  function getRandomRarity(){
    let r = Math.random() * 100;
    let sum = 0;
    for (const x of rarities) {
      sum += x.rate;
      if (r <= sum) return x.type;
    }
    return rarities[rarities.length - 1].type;
  }

  function getRandomPrize(){
    const rarity = getRandomRarity();
    const arr = currentCampaign().pools[rarity];
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function resetVideoToIdle(){
    videoEl.onended = null;
    videoEl.src = 'scene_1.mp4';
    videoEl.loop = true;
    videoEl.play();
  }

  function switchCampaign(key){
    if (isRolling || !campaigns[key]) return;
    activeCampaignKey = key;
    savePersistedData();
    document.getElementById('pageTitle').innerText = currentCampaign().title;
    document.getElementById('pageSubtitle').innerText = currentCampaign().subtitle;
    document.querySelectorAll('.campaign-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.campaign === key));
    updateTheme();
    renderLineup();
    updateCounter();
    overlayEl.style.opacity = 0;
    overlayEl.innerHTML = '';
    histEl.style.display = 'none';
    histEl.innerHTML = '';
    document.getElementById('listModal').style.display = 'none';
    document.getElementById('drawResultModal').style.display = 'none';
    resetVideoToIdle();
  }

  function drawGacha(count = 1){
    if (isRolling) return;
    count = Number(count) || 1;
    count = Math.max(1, Math.min(100, Math.floor(count)));
    isRolling = true;
    document.getElementById('drawResultModal').style.display = 'none';
    const results = Array.from({ length: count }, () => getRandomPrize());
    const bestRarity = getBestRarity(results);

    videoEl.src = 'scene_2.mp4';
    videoEl.loop = false;
    overlayEl.style.opacity = 0;
    overlayEl.innerHTML = '';
    videoEl.onended = () => {
      videoEl.src = bestRarity === 'SR' ? 'scene_3_rarity_A.mp4' : bestRarity === 'R' ? 'scene_3_rarity_B.mp4' : 'scene_3_rarity_C.mp4';
      videoEl.loop = true;
      videoEl.play();
      setTimeout(() => {
        overlayEl.innerHTML = count === 1 ? buildDisplayText(results[0]) : buildMultiDisplayText(results);
        overlayEl.style.opacity = 1;
        results.forEach(prize => {
          currentState().counts[prize.rarity]++;
          currentState().history.push(prize);
        });
        savePersistedData();
        updateCounter();
        renderHistoryIfOpen();
        if (count > 1) renderDrawResultModal(results);
        isRolling = false;
      }, 200);
    };
    videoEl.play();
  }

  document.querySelectorAll('.campaign-btn').forEach(btn => btn.addEventListener('click', () => switchCampaign(btn.dataset.campaign)));
  videoEl.addEventListener('click', () => drawGacha(1));
  document.getElementById('drawButton').addEventListener('click', () => drawGacha(1));
  document.getElementById('drawTenButton').addEventListener('click', () => drawGacha(10));
  document.getElementById('drawHundredButton').addEventListener('click', () => drawGacha(100));

  document.getElementById('showHistoryButton').addEventListener('click', () => {
    if (histEl.style.display === 'block') {
      histEl.style.display = 'none';
      histEl.innerHTML = '';
    } else {
      histEl.style.display = 'block';
      renderHistoryIfOpen();
    }
  });

  document.getElementById('showPrizeListButton').addEventListener('click', () => {
    renderPrizeList();
    document.getElementById('listModal').style.display = 'flex';
  });

  document.getElementById('closeListModal').addEventListener('click', () => {
    document.getElementById('listModal').style.display = 'none';
  });

  document.getElementById('closeDrawResultModal').addEventListener('click', () => {
    document.getElementById('drawResultModal').style.display = 'none';
  });

  document.getElementById('resetButton').addEventListener('click', () => {
    if (isRolling) return;
    currentCampaign().state = { counts:{SR:0,R:0,N:0}, history:[] };
    savePersistedData();
    updateCounter();
    histEl.style.display = 'none';
    histEl.innerHTML = '';
    overlayEl.style.opacity = 0;
    overlayEl.innerHTML = '';
    document.getElementById('drawResultModal').style.display = 'none';
    resetVideoToIdle();
  });

  loadPersistedData();
  switchCampaign(activeCampaignKey);
</script>
</body>
</html>
